version: "3.9"

services:
  license-manager:
    image: license-manager:latest   # or your DockerHub image, e.g. youruser/license-manager:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - license_data:/data          # SQLite database persisted across restarts
    environment:
      NODE_ENV: production
      PORT: 8082
      DATABASE_PATH: /data/licenseserver.db

      # ── Required ───────────────────────────────────────────────────────────────
      ADMIN_TOKEN: ${ADMIN_TOKEN:-changeme}            # Change this! Protects all /admin/* routes
      VAULT_WALLET_ADDRESS: ${VAULT_WALLET_ADDRESS:-}  # Global fallback vault (can be overridden per product)

      # ── Optional ───────────────────────────────────────────────────────────────
      SOLANA_RPC: ${SOLANA_RPC:-https://api.mainnet-beta.solana.com}

      # ── Global fallback pricing (optional) ─────────────────────────────────────
      # Pricing is managed per-product in the admin panel.
      # These values are only used as a fallback for products that have no price set.
      # Leave them out if you set prices exclusively through the admin panel.
      # MONTHLY_PRICE_SOL: 0.5
      # ANNUAL_PRICE_SOL: 1.5
      # LIFETIME_PRICE_SOL: 3
      # MONTHLY_PRICE_USDC: 49
      # ANNUAL_PRICE_USDC: 149
      # LIFETIME_PRICE_USDC: 299

    restart: unless-stopped

volumes:
  license_data:
    driver: local
