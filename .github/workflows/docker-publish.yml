name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:       # Always triggers when run manually from the Actions tab

env:
  IMAGE_NAME: license-manager

jobs:
  # ── Gate: only proceed if commit message contains [push to dockerhub] ──────────
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_push: ${{ steps.check.outputs.should_push }}
    steps:
      - name: Check commit message or event type
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          EVENT="${{ github.event_name }}"

          if [[ "$EVENT" == "workflow_dispatch" || "$EVENT" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "should_push=true" >> $GITHUB_OUTPUT
            echo "✅ Docker push triggered via $EVENT"
          elif echo "$MSG" | grep -qF "[push to dockerhub]"; then
            echo "should_push=true" >> $GITHUB_OUTPUT
            echo "✅ Docker push triggered by commit message keyword"
          else
            echo "should_push=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping Docker push — add [push to dockerhub] to commit message to trigger"
          fi

  # ── Build & push (only runs when gate passes) ─────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_push == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          readme-filepath: ./DOCKER_README.md
